<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Jane Doe Portfolio</title>
    <meta name="description" content="Get in touch with Jane Doe for collaborations, questions, or feedback via this contact form.">
    <meta name="keywords" content="contact, get in touch, email, form, Jane Doe">
    <meta name="author" content="Jane Doe">
</head>
<body>
    <header>
        <h1>Jane Doe</h1>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="contact.html"aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contact</h2>
        <p>Have a question, project idea, or just want to say hi? Fill out the form below.</p>

        <section aria-labelledby="contact-form-heading">
            <h3 id="contact-form-headingg">Send a message</h3>

            <form action="#" method="post">
                <div>
                    <label for="name">Name</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="subject">Subjext</label><br>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div>
                    <label for="message">Message</label><br>
                    <textarea name="message" id="message" rows="6" required></textarea>
                </div>
                <div>
                    <button type="submit">Send message</button>
                </div>
            </form>
        </section>

        <section aria-labelledby="other-ways-heading">
            <ul>
                <li>Email: <a href="#">janedoe@gmail.com</a></li>
                <li>Linkedln: <a href="#">linkedin.com/in/janedoe</a></li>
                <li>Github: <a href="#">github.com/janedoe</a></li>
            </ul>
        </section>
    </main>

</body>
</html>
