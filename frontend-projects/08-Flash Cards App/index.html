<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="app">
        <header class="app-header">
            <h1>JavaScript Flashcards</h1>
            <p class="subtitle">Flip through the cards. Click a card to reveal the asnwer.</p>
        </header>

        <section class="progress-wrap">
            <div class="progrgess-track">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="progress-label" class="progress-label">1/10</span>
        </section>


        <section class="card-stage">
            <button id="card" class="card">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <span class="card-tag">Question</span>
                        <p id="question-text" class="card-text"></p>
                        <span class="flip-hint">Click to flip</span>
                    </div>

                    <div class="card-face card-back">
                        <span class="card-tag">Answer</span>
                        <p id="answer-text" class="card-text"></p>
                        <span class="flip-hint">Click to flip</span>
                    </div>
                </div>
            </button>
        </section>

        <section class="conttrol">
            <button id="prev-btn" class="btn btn-secondary">← Previous</button>
            <button id="shuffle-btn" class="btn btn-secondary">Shuffle</button>
            <button id="next-btn" class="btn btn-primary">Next →</button>
        </section>
    </main>

    <script src="main.js"></script>

</body>
</html>
